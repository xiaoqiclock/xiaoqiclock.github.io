<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>File Viewer</title></head><body><h1>File Viewer</h1><input type="file"id="fileInput"accept="text/plain, image/*, audio/*, video/*"><div id="contentArea"></div><script>document.getElementById('fileInput').addEventListener('change',function(event){const file=event.target.files[0];if(!file){return}const contentType=file.type;const reader=new FileReader();const contentArea=document.getElementById('contentArea');contentArea.innerHTML='';if(contentType.startsWith('text/')){reader.onload=function(e){const text=e.target.result;const textarea=document.createElement('textarea');textarea.value=text;textarea.readOnly=true;textarea.style.width='100%';textarea.style.height='200px';contentArea.appendChild(textarea)};reader.readAsText(file)}else if(contentType.startsWith('image/')){const imgElement=document.createElement('img');imgElement.src=URL.createObjectURL(file);contentArea.appendChild(imgElement)}else if(contentType.startsWith('audio/')){const audioElement=document.createElement('audio');audioElement.src=URL.createObjectURL(file);audioElement.controls=true;contentArea.appendChild(audioElement)}else if(contentType.startsWith('video/')){const videoElement=document.createElement('video');videoElement.src=URL.createObjectURL(file);videoElement.controls=true;contentArea.appendChild(videoElement)}});</script></body></html>
