<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Nested Pages</title>
    <script>
        function openUrl() {
            var urlInput = document.getElementById("urlInput");
            var url = urlInput.value;
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url;
            }
            document.getElementById("iframeContainer").src = url;
        }

        function toggleFullScreen() {
            var iframe = document.getElementById("iframeContainer");
            if (!document.fullscreenElement) {
                iframe.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</head>
<body>
    <div>
        <input type="text" id="urlInput" placeholder="Please enter the web address">
        <button onclick="openUrl()">Open</button>
        <button onclick="toggleFullScreen()">Full Screen</button>
    </div>
    <br>
    <iframe id="iframeContainer" src="" width="100%" height="600px" sandbox="allow-scripts allow-same-origin"></iframe>
</body>
</html>
